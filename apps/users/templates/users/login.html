{% extends "base.html" %}

{% block title %}Logowanie{% endblock %}

{% block content %}
<section class="panel panel--wide" aria-labelledby="login-title">
  <h2 id="login-title">Logowanie</h2>

  <form method="post">
    {% csrf_token %}

    {% if form.non_field_errors %}
      <div class="panel">
        {{ form.non_field_errors }}
      </div>
    {% endif %}

    {{ form.as_p }}

    <button type="submit">Zaloguj</button>
  </form>
</section>
{% endblock %}
