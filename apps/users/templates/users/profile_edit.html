{% extends "base.html" %}

{% block title %}Edycja profilu{% endblock %}

{% block content %}
<section class="panel panel--wide" aria-labelledby="profile-edit-title">
  <h2 id="profile-edit-title">Edycja profilu</h2>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ user_form.as_p }}
    {{ profile_form.as_p }}
    <button type="submit" name="save_profile">Zapisz profil</button>
  </form>

  <hr>

  <h3>Zmien haslo</h3>
  <form method="post">
    {% csrf_token %}
    {{ password_form.as_p }}
    <button type="submit" name="change_password">Zmien haslo</button>
  </form>
</section>
{% endblock %}
